<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 2px solid black;
            width: 600px;
            height: 500px;
            background-color: aqua;
        }
        .box{
            border: 2px solid black;
            width:70px;
            height: 70px;
            background-color: red;
            border-radius: 100%;
            position: absolute;
            bottom: 20px;
            margin: 2px;
            animation: animateX 3s linear infinite, animateY 1s ease-out infinite alternate 
        }
        @keyframes animateY{
            from{
                bottom: 0px;
            }
            to{
                bottom: 100%;
            }

        }
         @keyframes animateX{
            from{
                left: 0px
            }
            to{
                left: 100%
            }
         }

    </style>
    
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
    
</body>
</html>
